{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/rates/labor/' ~ rate.id ~ '/edit' if rate else '/rates/labor' }}">
      <label for="effective_from">Effective from</label>
      <input id="effective_from" name="effective_from" type="date" value="{{ rate.effective_from if rate else '' }}" required>
      <label for="effective_to">Effective to</label>
      <input id="effective_to" name="effective_to" type="date" value="{{ rate.effective_to if rate and rate.effective_to else '' }}">
      <label for="hourly_rate">Hourly rate</label>
      <input id="hourly_rate" name="hourly_rate" value="{{ rate.hourly_rate if rate else '' }}" required>
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes">{{ rate.notes if rate and rate.notes else '' }}</textarea>
      <button type="submit">Save</button>
    </form>
  </section>
{% endblock %}
