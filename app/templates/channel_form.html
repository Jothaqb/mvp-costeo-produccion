{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post" action="{{ form_action }}">
      <label for="name">Name</label>
      <input id="name" name="name" value="{{ form_data.name }}" required>

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" name="applies_to_b2b" {% if form_data.applies_to_b2b %}checked{% endif %}>
          Applies to B2B
        </label>

        <label class="checkbox-label">
          <input type="checkbox" name="applies_to_b2c" {% if form_data.applies_to_b2c %}checked{% endif %}>
          Applies to B2C
        </label>
      </div>

      <label for="observations">Observations</label>
      <textarea id="observations" name="observations">{{ form_data.observations }}</textarea>

      <label class="checkbox-label">
        <input type="checkbox" name="active" {% if form_data.active %}checked{% endif %}>
        Active
      </label>

      <button type="submit">Save Channel</button>
      <a href="/master-data/channels">Cancel</a>
    </form>
  </section>
{% endblock %}
