{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <p class="eyebrow">Security</p>
      <h1>{{ title }}</h1>
      <p class="lead">Enter your email address and we will send a reset link if the account is eligible.</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      {% if success %}<p class="success">{{ success }}</p>{% endif %}
      <form method="post" action="/auth/forgot-password">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="{{ email }}" autocomplete="email" required>

        <div class="form-actions">
          <button type="submit">Send reset link</button>
          <a href="/login">Back to login</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
