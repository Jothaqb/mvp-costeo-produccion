{% extends "base.html" %}

{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <p class="eyebrow">Security</p>
      <h1>{{ title }}</h1>
      <p class="lead">Update the password for your current ERP session.</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      {% if success %}<p class="success">{{ success }}</p>{% endif %}
      <form method="post" action="/auth/change-password">
        <label for="current_password">Current password</label>
        <input id="current_password" name="current_password" type="password" autocomplete="current-password" required>

        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>

        <label for="confirm_new_password">Confirm new password</label>
        <input id="confirm_new_password" name="confirm_new_password" type="password" autocomplete="new-password" required>

        <div class="form-actions">
          <button type="submit">Update password</button>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
