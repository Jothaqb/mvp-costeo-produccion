{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/activities/' ~ activity.id ~ '/edit' if activity else '/activities' }}">
      <label for="code">Code</label>
      <input id="code" name="code" value="{{ activity.code if activity else '' }}" required>

      <label for="name">Name</label>
      <input id="name" name="name" value="{{ activity.name if activity else '' }}" required>

      <label for="description">Description</label>
      <textarea id="description" name="description">{{ activity.description if activity and activity.description else '' }}</textarea>

      <label><input name="applies_labor" type="checkbox" value="true" {% if not activity or activity.applies_labor %}checked{% endif %}> Applies labor</label>
      <label><input name="applies_machine" type="checkbox" value="true" {% if activity and activity.applies_machine %}checked{% endif %}> Applies machine</label>

      <label for="default_machine_id">Default machine</label>
      <select id="default_machine_id" name="default_machine_id">
        <option value="">None</option>
        {% for machine in machines %}
          <option value="{{ machine.id }}" {% if activity and activity.default_machine_id == machine.id %}selected{% endif %}>{{ machine.code }} - {{ machine.name }}</option>
        {% endfor %}
      </select>

      <label><input name="active" type="checkbox" value="true" {% if not activity or activity.active %}checked{% endif %}> Active</label>
      <button type="submit">Save</button>
    </form>
  </section>
{% endblock %}
