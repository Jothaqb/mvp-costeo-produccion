{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post" action="{{ form_action }}">
      <label for="name">Name</label>
      <input id="name" name="name" value="{{ form_data.name }}" required>

      <label for="discount_type">Discount type</label>
      <select id="discount_type" name="discount_type" required>
        {% for discount_type in discount_types %}
          <option value="{{ discount_type }}" {% if form_data.discount_type == discount_type %}selected{% endif %}>{{ discount_type }}</option>
        {% endfor %}
      </select>

      <label for="value">Value</label>
      <input id="value" name="value" inputmode="decimal" value="{{ form_data.value if form_data.value is not none else '' }}" required>

      <label for="applies_to">Applies to</label>
      <select id="applies_to" name="applies_to" required>
        {% for applies_to in discount_applies_to_options %}
          <option value="{{ applies_to }}" {% if form_data.applies_to == applies_to %}selected{% endif %}>{{ applies_to }}</option>
        {% endfor %}
      </select>

      <label for="channel">Channel</label>
      <select id="channel" name="channel" required>
        {% for channel in discount_channels %}
          <option value="{{ channel }}" {% if form_data.channel == channel %}selected{% endif %}>{{ channel }}</option>
        {% endfor %}
      </select>

      <label for="description">Description</label>
      <textarea id="description" name="description">{{ form_data.description }}</textarea>

      <label>
        <input type="checkbox" name="active" {% if form_data.active %}checked{% endif %}>
        Active
      </label>

      <button type="submit">Save Discount</button>
      <a href="/master-data/discounts">Cancel</a>
    </form>
  </section>
{% endblock %}
