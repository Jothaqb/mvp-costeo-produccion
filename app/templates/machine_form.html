{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/machines/' ~ machine.id ~ '/edit' if machine else '/machines' }}">
      <label for="code">Code</label>
      <input id="code" name="code" value="{{ machine.code if machine else '' }}" required>

      <label for="name">Name</label>
      <input id="name" name="name" value="{{ machine.name if machine else '' }}" required>

      <label><input name="active" type="checkbox" value="true" {% if not machine or machine.active %}checked{% endif %}> Active</label>
      <button type="submit">Save</button>
    </form>
  </section>
{% endblock %}
