{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/sales/b2c-customers/' ~ customer.id ~ '/edit' if customer else '/sales/b2c-customers' }}">
      <label for="name">Customer name</label>
      <input id="name" name="name" value="{{ customer.name if customer else '' }}" required>

      <label for="phone">Phone</label>
      <input id="phone" name="phone" value="{{ customer.phone if customer and customer.phone else '' }}">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ customer.email if customer and customer.email else '' }}">

      <label for="address">Address</label>
      <textarea id="address" name="address">{{ customer.address if customer and customer.address else '' }}</textarea>

      <label for="province">Province</label>
      <input id="province" name="province" value="{{ customer.province if customer and customer.province else '' }}">

      <label for="canton">Canton</label>
      <input id="canton" name="canton" value="{{ customer.canton if customer and customer.canton else '' }}">

      <label for="district">District</label>
      <input id="district" name="district" value="{{ customer.district if customer and customer.district else '' }}">

      <label for="observations">Observations</label>
      <textarea id="observations" name="observations">{{ customer.observations if customer and customer.observations else '' }}</textarea>

      <label>
        <input type="checkbox" name="active" value="true" {% if not customer or customer.active %}checked{% endif %}>
        Active
      </label>

      <button type="submit">Save customer</button>
      <a href="/sales/b2c-customers">Cancel</a>
    </form>
  </section>
{% endblock %}
