{% extends "base.html" %}

{% block content %}
  <section>
    <h1>{{ title }}</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ form_action }}">
      <label for="name">Name</label>
      <input id="name" name="name" value="{{ form_data.name }}" required>

      <label for="contact_name">Contact name</label>
      <input id="contact_name" name="contact_name" value="{{ form_data.contact_name }}">

      <label for="phone">Phone</label>
      <input id="phone" name="phone" value="{{ form_data.phone }}">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ form_data.email }}">

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes">{{ form_data.notes }}</textarea>

      <label><input type="checkbox" name="active" value="true" {% if form_data.active %}checked{% endif %}> Active</label>

      <button type="submit">Save supplier</button>
      <a href="/master-data/suppliers">Cancel</a>
    </form>
  </section>
{% endblock %}
